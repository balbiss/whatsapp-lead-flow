version: '3.8'

services:
  backend:
    # Imagem buildada manualmente no servidor (docker build -t crm-backend:latest ./server)
    image: crm-backend:latest
    networks:
      - inoovawebpro
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - WUZAPI_BASE_URL=${WUZAPI_BASE_URL}
      - WUZAPI_ADMIN_TOKEN=${WUZAPI_ADMIN_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == inoovaweb
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        # Rota para a API (prefixo /api)
        - traefik.http.routers.crm-backend.rule=Host(`crm.inoovaweb.com.br`) && PathPrefix(`/api`)
        - traefik.http.routers.crm-backend.entrypoints=websecure
        - traefik.http.routers.crm-backend.tls.certresolver=letsencryptresolver
        - traefik.http.services.crm-backend.loadbalancer.server.port=3006

  frontend:
    # Imagem buildada manualmente no servidor (docker build -t crm-frontend:latest .)
    image: crm-frontend:latest
    networks:
      - inoovawebpro
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == inoovaweb
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        # Rota principal para o Frontend
        - traefik.http.routers.crm-frontend.rule=Host(`crm.inoovaweb.com.br`)
        - traefik.http.routers.crm-frontend.entrypoints=websecure
        - traefik.http.routers.crm-frontend.tls.certresolver=letsencryptresolver
        - traefik.http.services.crm-frontend.loadbalancer.server.port=80

networks:
  inoovawebpro:
    external: true
